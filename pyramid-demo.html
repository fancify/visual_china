<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>千里江山图 · Pyramid Renderer Demo</title>
  <style>
    body {
      margin: 0;
      background: #0a1015;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #d8e6df;
      overflow: hidden;
    }
    #canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      padding: 8px 12px;
      background: rgba(8, 18, 19, 0.85);
      border: 1px solid rgba(216, 230, 223, 0.3);
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.5;
      max-width: 380px;
      pointer-events: none;
    }
    #controls {
      position: fixed;
      bottom: 10px;
      left: 10px;
      padding: 8px 12px;
      background: rgba(8, 18, 19, 0.85);
      border: 1px solid rgba(216, 230, 223, 0.3);
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.6;
      opacity: 0.8;
    }
    h1 {
      margin: 0 0 4px 0;
      font-size: 14px;
      color: #ffe7a8;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="status">
    <h1>千里江山图 · 地形重写 v2 P3 demo</h1>
    <div id="status-body">加载中...</div>
  </div>
  <div id="controls">
    WASD / 方向键: 移动相机<br />
    Q / E: 上下<br />
    鼠标拖动: 转视角
  </div>
  <script type="module" src="/src/pyramid-demo.ts"></script>
</body>
</html>
