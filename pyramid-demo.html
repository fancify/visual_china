<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>千里江山图 · Pyramid Renderer Demo</title>
  <style>
    body {
      margin: 0;
      background: #c7d5e3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #d8e6df;
      overflow: hidden;
    }
    #canvas {
      width: 100vw;
      height: 100vh;
      display: block;
      background: #c7d5e3;
    }
    #status {
      position: fixed;
      top: 10px;
      left: 10px;
      padding: 8px 12px;
      background: rgba(8, 18, 19, 0.85);
      border: 1px solid rgba(216, 230, 223, 0.3);
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.5;
      max-width: 380px;
      pointer-events: none;
    }
    #controls {
      position: fixed;
      bottom: 10px;
      left: 10px;
      padding: 8px 12px;
      background: rgba(8, 18, 19, 0.85);
      border: 1px solid rgba(216, 230, 223, 0.3);
      border-radius: 4px;
      font-size: 11px;
      line-height: 1.6;
      opacity: 0.8;
    }
    h1 {
      margin: 0 0 4px 0;
      font-size: 14px;
      color: #ffe7a8;
    }
    #preload {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0), rgba(226, 237, 226, 0)),
        rgba(246, 249, 244, 0);
      backdrop-filter: none;
      transition: opacity 650ms ease, visibility 650ms ease;
    }
    #preload.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    #preload-panel {
      width: min(560px, calc(100vw - 48px));
      color: #1d2a25;
      text-align: center;
      text-shadow: none;
    }
    #preload-poem {
      margin-bottom: 14px;
      font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
      font-size: 28px;
      line-height: 1.55;
      color: #15231d;
      white-space: pre-line;
    }
    #preload-poem-meta {
      margin-bottom: 24px;
      font-size: 13px;
      line-height: 1.7;
      color: rgba(29, 42, 37, 0.72);
    }
    #preload-meta {
      margin-bottom: 16px;
      font-size: 13px;
      color: rgba(29, 42, 37, 0.68);
    }
    #preload-track {
      height: 6px;
      overflow: hidden;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.55);
      border-radius: 999px;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.58),
        0 10px 32px rgba(55, 78, 68, 0.16);
    }
    #preload-bar {
      width: 0%;
      height: 100%;
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.95);
      border-radius: inherit;
      transition: width 760ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    #preload-bar::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: -45%;
      width: 45%;
      background: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0),
        rgba(129, 157, 138, 0.32),
        rgba(255, 255, 255, 0)
      );
      animation: preload-sheen 1.35s ease-in-out infinite;
    }
    @keyframes preload-sheen {
      from { transform: translateX(0); }
      to { transform: translateX(330%); }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="preload">
    <div id="preload-panel">
      <div id="preload-poem">空山新雨后，天气晚来秋。</div>
      <div id="preload-poem-meta">王维 · 约开元至天宝年间（约713-756）</div>
      <div id="preload-meta">准备地形...</div>
      <div id="preload-track"><div id="preload-bar"></div></div>
    </div>
  </div>
  <div id="status">
    <h1>千里江山图 · 地形重写 v2 P3 demo</h1>
    <div id="status-body">加载中...</div>
  </div>
  <div id="controls">
    WASD / 方向键: 移动相机<br />
    Q / E: 上下<br />
    鼠标拖动: 转视角
  </div>
  <script type="module" src="/src/pyramid-demo.ts"></script>
</body>
</html>
